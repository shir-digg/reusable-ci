name: Changelog Update Alert

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate Slack webhook secret
        env:
          SLACK_TEST_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
        run: |
          if [ -z "$SLACK_TEST_WEBHOOK" ]; then
            echo "SLACK_TEST_WEBHOOK is empty or not configured for this repository/environment."
            exit 1
          fi

      - name: Extract latest changelog section
        id: latest
        run: |
          awk '
            BEGIN { in_block=0; heading_count=0 }
            /^## \[/ {
              heading_count++
              if (heading_count == 1) { in_block=1 }
              else if (heading_count == 2) { exit }
            }
            in_block { print }
          ' CHANGELOG.md > latest-changelog.md

          if [ ! -s latest-changelog.md ]; then
            echo "Could not extract latest changelog section from CHANGELOG.md"
            exit 1
          fi

      - name: Build Slack payload file
        run: |
          # Read changelog section and truncate if too long for Slack
          NOTES=$(cat latest-changelog.md)
          if [ ${#NOTES} -gt 2800 ]; then
            NOTES="${NOTES:0:2797}..."
          fi

          # Build JSON payload with jq (pre-installed on ubuntu-latest)
          jq -n \
            --arg text "Latest changelog update" \
            --arg notes "$NOTES" \
            --arg commit_url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            '{
              text: $text,
              blocks: [
                {
                  type: "header",
                  text: {
                    type: "plain_text",
                    text: "Release changelog updated"
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $notes
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: ("<" + $commit_url + "|View commit>")
                    }
                  ]
                }
              ]
            }' > slack-payload.json

      - name: Send changelog Slack message
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_TEST_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-file-path: slack-payload.json
